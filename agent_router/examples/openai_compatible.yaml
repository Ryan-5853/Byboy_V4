agent:
  name: research-worker
  retries: 1
  tool_timeout: 20
  output_schema:
    answer: str
    sources: list[str]
    confidence: float
  stream_events: true
  log_tool_results: true
  log_preview_chars: 1200
  log_arg_deltas: false
  log_text_deltas: false
  log_thinking: true

model_alias: local-default

model_settings:
  temperature: 0.2

usage_limits:
  request_limit: 8
  tool_calls_limit: 5

context_management:
  enabled: true
  threshold_ratio: 0.8
  max_context_tokens: 32000
  compact_model_alias: local-default

tools:
  - name: web.fetch_url
    config:
      max_read_chars: 5000
      timeout_seconds: 20
